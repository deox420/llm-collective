<text x="60" y="542" font-size="12" fill="#5F5E5A">Coral = arquitecto/lider en GPU alquilada (el cerebro del equipo)</text>
<text x="60" y="562" font-size="12" fill="#5F5E5A">Teal = programador y revisor en Ollama Cloud. Purpura = tester ejecutor</text>
<text x="60" y="582" font-size="12" fill="#5F5E5A">Ambar = herramientas reales con efectos en disco (sandbox Docker)</text>
