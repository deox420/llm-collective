<text x="60" y="536" font-size="12" fill="#5F5E5A">Verde = pipeline de indexado (corre cuando cambian las notas)</text>
<text x="60" y="556" font-size="12" fill="#5F5E5A">Coral = chairman en GPU alquilada. Purpura = base vectorial + orquestacion</text>
<text x="60" y="576" font-size="12" fill="#5F5E5A">Ambar = tunel seguro: accedes en remoto sin abrir tu maquina al mundo</text>
<text x="60" y="596" font-size="12" fill="#5F5E5A">Teal punteado = agentes cloud opcionales (mini-council sobre las notas)</text>
<text x="60" y="612" font-size="12" fill="#5F5E5A">Chairman + base en la misma GPU => tus notas no salen de ahi</text>
